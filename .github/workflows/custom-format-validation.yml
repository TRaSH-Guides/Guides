name: Validate Custom Format JSONs

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/custom-format-validation.yml
      - docs/json/guide-only/*.json
      - docs/json/radarr/cf/*.json
      - docs/json/sonarr/cf/*.json
      - docs/json/radarr/conflicts.json
      - docs/json/sonarr/conflicts.json
      - schemas/**/*.json
      - scripts/validate-source-specifications.py
      - tests/test_validate_source_specifications.py
  pull_request:
    paths:
      - .github/workflows/custom-format-validation.yml
      - docs/json/guide-only/*.json
      - docs/json/radarr/cf/*.json
      - docs/json/sonarr/cf/*.json
      - docs/json/radarr/conflicts.json
      - docs/json/sonarr/conflicts.json
      - schemas/**/*.json
      - scripts/validate-source-specifications.py
      - tests/test_validate_source_specifications.py

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate Guide only Custom Formats
        run: check-jsonschema -v --schemafile schemas/guide-only-cf.schema.json docs/json/guide-only/*.json

      - name: Validate Radarr Custom Formats
        run: check-jsonschema -v --schemafile schemas/radarr-cf.schema.json docs/json/radarr/cf/*.json

      - name: Validate Sonarr Custom Formats
        run: check-jsonschema -v --schemafile schemas/sonarr-cf.schema.json docs/json/sonarr/cf/*.json

      - name: Validate Conflicts
        run: |
          for f in docs/json/radarr/conflicts.json docs/json/sonarr/conflicts.json; do
            [ -f "$f" ] && check-jsonschema -v --schemafile schemas/conflicts.schema.json "$f"
          done

      - name: Validate custom format consistency
        run: python scripts/validate-custom-formats.py

      - name: Validate SourceSpecification per-app values
        run: python scripts/validate-source-specifications.py

      - name: Test source and modifier validation
        run: python -m unittest tests/test_validate_source_specifications.py

      - name: Validate changed Radarr Remux specifications
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "Initial branch push; skipping diff-based Remux check."
            exit 0
          fi
          mapfile -t changed_files < <(
            git diff --name-only --diff-filter=ACM "$BASE_SHA" "$HEAD_SHA" -- 'docs/json/radarr/cf/*.json'
          )
          python scripts/validate-source-specifications.py --remux-files "${changed_files[@]}"
