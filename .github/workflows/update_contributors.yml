name: Update contributors

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  update_contributors:
    runs-on: ubuntu-latest
    steps:
      # PAT is required to push commits back to the repository.
      - name: Checkout code # zizmor: ignore[artipacked]
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ secrets.PAT }}

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install axios # zizmor: ignore[adhoc-packages]

      - name: Update CONTRIBUTORS.md
        run: node .github/scripts/update-contributors.js

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: "chore(contributors): Update CONTRIBUTORS.md"
          file_pattern: "CONTRIBUTORS.md"
