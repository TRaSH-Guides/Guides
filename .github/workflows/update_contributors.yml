name: Update contributors

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  update_contributors:
    runs-on: ubuntu-latest
    steps:
      # PAT is required to push commits back to the repository.
      - name: Checkout code # zizmor: ignore[artipacked]
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.PAT }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install axios

      - name: Update CONTRIBUTORS.md
        run: node .github/scripts/update-contributors.js

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: "chore(contributors): Update CONTRIBUTORS.md"
          file_pattern: "CONTRIBUTORS.md"
