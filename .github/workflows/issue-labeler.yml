name: Label Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Issue Labeler
        uses: github/issue-labeler@c1b0f9f52a63158c4adc09425e858e87b32e9685  # v3.4
        with:
          configuration-path: .github/issue-labeler.yml
          enable-versioned-regex: "0"
          include-title: "1"
          include-body: "1"
          sync-labels: "0"
          repo-token: ${{ github.token }}
