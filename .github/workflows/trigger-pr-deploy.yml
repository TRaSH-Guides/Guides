name: Trigger PR Build

on:
  pull_request:

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false
    steps:
      - name: Filter rendered content changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            rendered:
              - 'docs/**'
              - 'images/**'
              - 'includes/**'
              - 'overrides/**'
              - 'mkdocs.yml'
              - 'docs/requirements.txt'

      - name: Checkout
        if: steps.filter.outputs.rendered == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
          sparse-checkout: |
            docs
            images
            includes
            overrides
            mkdocs.yml
            docs/requirements.txt

      # PR caches are scoped to the merge ref and cannot be restored by the base branch
      # or other PRs, so fork PRs cannot poison the cache used by trusted builds.
      - name: Setup python # zizmor: ignore[cache-poisoning]
        if: steps.filter.outputs.rendered == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.x
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        if: steps.filter.outputs.rendered == 'true'
        run: pip install -r docs/requirements.txt

      - name: Build mkdocs
        if: steps.filter.outputs.rendered == 'true'
        run: |
          mkdocs build --clean
          mkdocs --version

      - name: Save PR metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          SHOULD_DEPLOY: ${{ steps.filter.outputs.rendered }}
        run: |
          mkdir -p ./pr_build
          echo "$PR_NUMBER" > ./pr_build/PR_NUMBER
          echo "$PR_SHA" > ./pr_build/PR_SHA
          echo "$SHOULD_DEPLOY" > ./pr_build/SHOULD_DEPLOY
          if [ "$SHOULD_DEPLOY" = "true" ]; then
            mv site pr_build/site
          fi

      - name: Upload PR build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr_build
          path: pr_build/
